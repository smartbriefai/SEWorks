name: Deploy SEW Website to GitHub Pages

on:
  push:
    branches:
      - 'claude/sew-website-build-dkF5P'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout build branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push index.html to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          # Create orphan gh-pages branch with only index.html
          git checkout --orphan gh-pages-new
          git rm -rf .
          git checkout claude/sew-website-build-dkF5P -- index.html
          git add index.html
          git commit -m "Deploy: SEW website to gh-pages [skip ci]"
          git push origin HEAD:gh-pages --force
          echo "✓ gh-pages branch created/updated"

      - name: Configure GitHub Pages source
        run: |
          # Try PUT (update existing) first, then POST (create new)
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}')

          echo "PUT response: $RESPONSE"

          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "204" ]; then
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/${{ github.repository }}/pages \
              -d '{"source":{"branch":"gh-pages","path":"/"}}')
            echo "POST response: $RESPONSE"
          fi

      - name: Report Pages status
        run: |
          sleep 5
          curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              print('Pages URL:', d.get('html_url','N/A'))
              print('Branch:   ', d.get('source',{}).get('branch','N/A'))
              print('Status:   ', d.get('status','N/A'))
          except:
              print('Pages not yet configured (may need manual setup in repo Settings)')
          "
